services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: superdados
      POSTGRES_USER: superdados
      POSTGRES_PASSWORD: superdados
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superdados -d superdados"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://superdados:superdados@postgres:5432/superdados
      HASH_SALT: local-dev-salt
      APP_ENV: local
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
